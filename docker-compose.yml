version: '3.8'

services:
  web:
    image: ${DOCKERHUB_USERNAME}/smartnyumba:${IMAGE_TAG:-latest}
    container_name: smartnyumba_web
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
             gunicorn --bind 0.0.0.0:8000 --workers 3 --timeout 120 smartnyumba_system.wsgi:application"
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    expose:
      - 8000
    env_file:
      - .env
    networks:
      - smartnyumba_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    container_name: smartnyumba_nginx
    restart: unless-stopped
    ports:
      - "8080:80"  # Using port 8080 to avoid conflict with existing services
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/static
      - media_volume:/app/media
    depends_on:
      - web
    networks:
      - smartnyumba_network

volumes:
  static_volume:
  media_volume:

networks:
  smartnyumba_network:
    driver: bridge
